name: Scraps
options:
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  minimumXcodeGenVersion: "2.40"

settings:
  SWIFT_VERSION: "6.0"
  MACOSX_DEPLOYMENT_TARGET: "26.0"

packages:
  swift-markdown:
    url: https://github.com/swiftlang/swift-markdown.git
    from: "0.5.0"

targets:
  Scraps:
    type: application
    platform: macOS
    sources:
      - path: Scraps
    info:
      path: Scraps/Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Scraps
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
    dependencies:
      - package: swift-markdown
        product: Markdown
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.celom.scraps
      INFOPLIST_FILE: Scraps/Resources/Info.plist
      GENERATE_INFOPLIST_FILE: true
      SWIFT_VERSION: "6.0"

  ScrapsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ScrapsTests
    dependencies:
      - target: Scraps
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.celom.scraps.tests
      GENERATE_INFOPLIST_FILE: true
      SWIFT_VERSION: "6.0"
